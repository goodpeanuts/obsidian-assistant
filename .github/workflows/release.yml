name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release assets
        shell: bash
        run: |
          PLUGIN_ID=$(node -p "require('./manifest.json').id")
          VERSION=$(node -p "require('./manifest.json').version")
          mkdir -p "release/${PLUGIN_ID}"
          cp main.js manifest.json styles.css "release/${PLUGIN_ID}/"
          (cd "release/${PLUGIN_ID}" && zip -r "../${PLUGIN_ID}-${VERSION}.zip" .)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
            release/*.zip
